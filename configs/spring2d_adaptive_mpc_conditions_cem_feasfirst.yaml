identifier_conditions_config: configs/spring2d_identifier_conditions.yaml
baseline_summary_table: results/figures/spring2d_identifier_conditions/summary_table.csv

mpc_overrides:
  solver:
    type: cem
    selection: feasibility_first
    horizon: 18
    prediction_dt: 0.03
    num_samples: 128
    num_elites: 16
    iterations: 3
    cem_alpha: 0.7
    init_std_F_tan: 4.0
    init_std_F_rad: 0.3
    min_std_F_tan: 0.2
    min_std_F_rad: 0.05
    warm_start: true
    violation_weights:
      F_tan: 1.0
      F_rad: 1.0
      delta_r: 1.0
      omega: 1.0
      alpha: 1.0

adaptive:
  warmup_steps: 0
  parameter_smoothing_alpha: 1.0
  parameter_bounds:
    m: [0.5, 2.0]
    k: [150.0, 800.0]
    b_r: [2.0, 45.0]

outputs:
  log_dir: results/stage2_cem_feasfirst/logs/cem_feasibility_first
  video_dir: results/stage2_cem_feasfirst/videos
  figure: results/stage2_cem_feasfirst/figures/cem_feasibility_first_adaptive_conditions.png
  summary_table: results/stage2_cem_feasfirst/tables/cem_feasibility_first_summary.csv
  fps: 25
