identifier_conditions_config: configs/spring2d_identifier_conditions.yaml
baseline_summary_table: results/figures/spring2d_identifier_conditions/summary_table.csv

mpc_overrides:
  solver:
    type: cem
    horizon: 18
    prediction_dt: 0.03
    num_samples: 128
    num_elites: 16
    iterations: 3
    cem_alpha: 0.7
    init_std_F_tan: 4.0
    init_std_F_rad: 0.3
    min_std_F_tan: 0.2
    min_std_F_rad: 0.05
    warm_start: true
    safety_mode: off
    safety_penalty_weight: 1.0
    alpha_constraint_mode: hard
    alpha_soft_weight: 1.0
    alpha_soft_weight_list: [1, 10, 100, 1000]
    alpha_relaxed_multiplier: 2.0
    alpha_relaxed_multiplier_list: [2.0, 3.0]
    collect_iteration_diagnostics: false
    collect_sample_diagnostics: false
    safety_violation_weights:
      F_tan: 1.0
      F_rad: 1.0
      delta_r: 1.0
      omega: 1.0
      alpha: 1.0

adaptive:
  warmup_steps: 0
  parameter_smoothing_alpha: 1.0
  parameter_bounds:
    m: [0.5, 2.0]
    k: [150.0, 800.0]
    b_r: [2.0, 45.0]

observation_filter:
  type: ukf_bias
  identifier_input: filtered

coupling_ablation:
  name: safety_aware_cem_filtered_identifier_adaptive
  mpc_state_input: filtered
  identifier_input: filtered
  identifier_mode: adaptive
  estimator_model_params_source: adaptive
  mpc_model_params_source: adaptive

safety_filter:
  enabled: false

outputs:
  log_dir: results/stage7a_safety_aware_cem/logs
  video_dir: results/stage7a_safety_aware_cem/videos
  figure: results/stage7a_safety_aware_cem/figs/safety_aware_cem_comparison.png
  summary_table: results/stage7a_safety_aware_cem/stage7a_summary.csv
  fps: 25
